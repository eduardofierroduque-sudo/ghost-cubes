<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghost Cubes - Retro FPS</title>
    <style>
        body { margin: 0; background: #000510; color: #0ff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: #000510; cursor: crosshair; }
        canvas { width: 100%; height: 100%; display: block; }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
        @keyframes flicker {
            0%, 100% { opacity: 0.06; }
            50% { opacity: 0.1; }
        }
        @keyframes glitch {
            0%, 94%, 100% { text-shadow: 0 0 40px #0ff, 0 0 80px #0ff44, 4px 0 #f0f; transform: none; filter: none; }
            2% { text-shadow: 5px 0 #f0f, -5px 0 #0ff; transform: skew(0.8deg); filter: hue-rotate(12deg); }
            4% { text-shadow: 0 0 40px #0ff, 0 0 80px #0ff44, 4px 0 #f0f; transform: none; filter: none; }
            49% { text-shadow: -4px 0 #f0f, 3px 0 #0ff; transform: skew(-0.5deg); filter: hue-rotate(-8deg); }
            51% { text-shadow: 0 0 40px #0ff, 0 0 80px #0ff44, 4px 0 #f0f; transform: none; filter: none; }
            78% { text-shadow: 3px 0 #f0f, -2px 0 #0ff; transform: translateX(1px); filter: hue-rotate(6deg); }
            80% { text-shadow: 0 0 40px #0ff, 0 0 80px #0ff44, 4px 0 #f0f; transform: none; filter: none; }
        }
        @keyframes glitchH2 {
            0%, 94%, 100% { text-shadow: 0 0 40px #f0f, 0 0 80px #f0f44, 4px 0 #0ff; transform: none; filter: none; }
            2% { text-shadow: 5px 0 #0ff, -5px 0 #f0f; transform: skew(0.8deg); filter: hue-rotate(12deg); }
            4% { text-shadow: 0 0 40px #f0f, 0 0 80px #f0f44, 4px 0 #0ff; transform: none; filter: none; }
            49% { text-shadow: -4px 0 #0ff, 3px 0 #f0f; transform: skew(-0.5deg); filter: hue-rotate(-8deg); }
            51% { text-shadow: 0 0 40px #f0f, 0 0 80px #f0f44, 4px 0 #0ff; transform: none; filter: none; }
            78% { text-shadow: 3px 0 #0ff, -2px 0 #f0f; transform: translateX(-1px); filter: hue-rotate(6deg); }
            80% { text-shadow: 0 0 40px #f0f, 0 0 80px #f0f44, 4px 0 #0ff; transform: none; filter: none; }
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
        @keyframes floatWide {
            0% { transform: translate(0, 110vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.2; }
            100% { transform: translate(30px, -10vh) scale(1.3); opacity: 0; }
        }

        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle {
            position: absolute; border-radius: 50%; pointer-events: none;
            animation: floatUp linear infinite;
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,255,0.03) 2px, rgba(0,255,255,0.03) 4px);
            pointer-events: none; z-index: 501;
        }

        #start-page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background:
                linear-gradient(0deg, transparent 24%, rgba(0,255,255,0.02) 25%, rgba(0,255,255,0.02) 26%, transparent 27%, transparent 74%, rgba(0,255,255,0.02) 75%, rgba(0,255,255,0.02) 76%, transparent 77%),
                linear-gradient(90deg, transparent 24%, rgba(0,255,255,0.015) 25%, rgba(0,255,255,0.015) 26%, transparent 27%, transparent 74%, rgba(0,255,255,0.015) 75%, rgba(0,255,255,0.015) 76%, transparent 77%),
                radial-gradient(ellipse at center, #001020 0%, #000510 70%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; color: #0ff;
        }

        .start-frame {
            border: 1px solid rgba(0,255,255,0.2);
            border-top: 2px solid rgba(0,255,255,0.4);
            padding: 45px 55px; text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 60px #0ff11, inset 0 1px 0 rgba(0,255,255,0.1);
            background: rgba(0,10,20,0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            min-width: 360px; position: relative;
        }
        .start-frame::before {
            content: ''; position: absolute; top: -8px; left: 15px; right: 15px; height: 2px;
            background: linear-gradient(90deg, transparent, #0ff, rgba(0,255,255,0.2), transparent);
            box-shadow: 0 0 15px #0ff;
        }
        .start-frame::after {
            content: ''; position: absolute; bottom: -8px; left: 15px; right: 15px; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,0,255,0.2), #f0f, transparent);
            box-shadow: 0 0 15px #f0f;
        }

        .ghost-deco {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 340px; height: 80px; z-index: 0; pointer-events: none;
        }
        .ghost-cube {
            position: absolute; width: 22px; height: 22px;
            background: rgba(0,255,255,0.04); border: 1px solid rgba(0,255,255,0.08);
            border-radius: 3px; filter: blur(1.5px);
        }
        .ghost-cube::after {
            content: ''; position: absolute; width: 4px; height: 5px; border-radius: 50%;
            background: #0ff; top: 5px; box-shadow: 0 0 6px #0ff, 0 0 14px #0ff, 8px 0 0 #0ff, 8px 0 6px #0ff, 8px 0 14px #0ff;
        }
        .ghost-cube {
            position: absolute; width: 22px; height: 22px;
            background: rgba(0,255,255,0.04); border: 1px solid rgba(0,255,255,0.08);
            border-radius: 3px; filter: blur(1.5px);
        }
        .ghost-cube::after {
            content: ''; position: absolute; width: 4px; height: 5px; border-radius: 50%;
            background: #0ff; top: 5px; box-shadow: 0 0 6px #0ff, 0 0 14px #0ff, 8px 0 0 #0ff, 8px 0 6px #0ff, 8px 0 14px #0ff;
        }
        .g1 { left: 20px; top: 35px; --r:-8deg; animation: ghostFloat 4s 0s infinite; }
        .g2 { left: 70px; top: 18px; --r:5deg; animation: ghostFloat 4.2s 0.6s infinite; }
        .g3 { left: 125px; top: 8px; --r:-3deg; animation: ghostFloat 3.8s 1.2s infinite; }
        .g4 { left: 180px; top: 15px; --r:7deg; animation: ghostFloat 4.5s 0.3s infinite; }
        .g5 { left: 230px; top: 38px; --r:-6deg; animation: ghostFloat 3.9s 0.9s infinite; }
        .g6 { left: 280px; top: 20px; --r:4deg; animation: ghostFloat 4.1s 1.5s infinite; }
        .g7 { left: 310px; top: 45px; --r:-10deg; animation: ghostFloat 4.3s 0.4s infinite; }
        @keyframes ghostFloat {
            0%, 100% { transform: translateY(0) rotate(var(--r)); }
            50% { transform: translateY(-6px) rotate(var(--r)); }
        }

        #start-logo {
            font-size: 4em; font-weight: 900; text-align: center; line-height: 1.0;
            text-shadow: 0 0 40px #0ff, 0 0 80px #0ff44, 3px 3px 0 rgba(0,0,0,0.8), 5px 0 #f0f44;
            animation: glitch 5s infinite; margin-bottom: 8px; letter-spacing: 14px;
            position: relative; z-index: 1;
        }
        #start-sub {
            font-size: 1.1em; color: #f0f; letter-spacing: 14px; font-weight: 900;
            text-shadow: 0 0 15px #f0f, 0 0 30px #f0f44; margin-bottom: 25px;
        }
        .start-line {
            width: 60%; height: 1px; background: linear-gradient(90deg, transparent, #0ff, transparent);
            margin: 0 auto 25px; opacity: 0.6;
        }
        #start-page input {
            background: rgba(0,60,0,0.92); color: #000; border: 2px solid #0f0;
            padding: 16px 24px; font-family: 'Courier New', monospace; font-size: 1.3em;
            text-align: center; outline: none; width: 280px;
            text-transform: uppercase; letter-spacing: 5px; font-weight: 900;
            box-shadow: 0 0 30px rgba(0,255,0,0.5), 0 0 60px rgba(0,255,0,0.2), inset 0 0 20px rgba(0,255,0,0.2);
        }
        #start-page input::placeholder { color: rgba(0,0,0,0.35); letter-spacing: 3px; font-weight: bold; }
        #start-page input:focus { border-color: #0f0; border-width: 2px; background: rgba(0,80,0,0.95); color: #000; box-shadow: 0 0 40px #0f0, 0 0 80px rgba(0,255,0,0.5), 0 0 120px rgba(0,255,0,0.3), inset 0 0 30px rgba(0,255,0,0.3); }
        #start-btn {
            background: transparent; color: #0ff; border: 2px solid #0ff;
            padding: 12px 70px; font-family: 'Courier New', monospace; font-size: 1.3em; font-weight: 900;
            cursor: pointer; margin-top: 22px; letter-spacing: 10px;
            box-shadow: 0 0 25px #0ff33; transition: 0.2s;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        #start-btn:hover { background: #0ff; color: #000510; box-shadow: 0 0 50px #0ff, 0 0 100px #0ff66; }
        #start-btn:disabled { opacity: 0.25; cursor: not-allowed; box-shadow: none; color: rgba(0,255,255,0.2); border-color: rgba(0,255,255,0.1); }
        #start-btn:disabled:hover { background: transparent; color: rgba(0,255,255,0.2); box-shadow: none; }
        #mode-label {
            margin-top: 18px; font-size: 0.7em; letter-spacing: 4px;
            color: rgba(0,255,255,0.4); font-weight: 900; text-transform: uppercase;
        }
        #mode-selector { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
        .mode-btn {
            background: transparent; color: rgba(0,255,255,0.35); border: 1px solid rgba(0,255,255,0.2);
            padding: 10px 30px; font-family: 'Courier New', monospace; font-size: 0.9em; font-weight: 900;
            cursor: pointer; letter-spacing: 4px; transition: 0.25s;
        }
        .mode-btn:hover { color: #0ff; border-color: #0ff; box-shadow: 0 0 15px #0ff44; }
        .mode-btn.active { color: #000510; background: #0ff; border-color: #0ff; box-shadow: 0 0 20px #0ff66; }

        /* Pink mode (Little Hen) */
        #start-page.pink .start-frame { border-color: rgba(255,50,150,0.5); border-top-color: rgba(255,50,150,0.6); box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 60px rgba(255,50,150,0.1), inset 0 1px 0 rgba(255,50,150,0.08); }
        #start-page.pink .start-frame::before { background: linear-gradient(90deg, transparent, #f6a, rgba(255,50,150,0.3), transparent); box-shadow: 0 0 15px #f6a; }
        #start-page.pink .start-frame::after { background: linear-gradient(90deg, transparent, rgba(255,50,150,0.3), #f6a, transparent); box-shadow: 0 0 15px #f6a; }
        #start-page.pink #start-logo { text-shadow: 0 0 40px #f6a, 0 0 80px rgba(255,80,150,0.3), 3px 3px 0 rgba(0,0,0,0.8), 5px 0 rgba(0,255,255,0.3); color: #f8c; }
        #start-page.pink #start-sub { color: #f6a; text-shadow: 0 0 15px #f6a, 0 0 30px rgba(255,80,150,0.3); }
        #start-page.pink .start-line { background: linear-gradient(90deg, transparent, #f6a, transparent); }
        #start-page.pink #start-btn { color: #f6a; border-color: #f6a; box-shadow: 0 0 25px rgba(255,50,150,0.3); }
        #start-page.pink #start-btn:hover { background: #f6a; color: #000510; box-shadow: 0 0 50px #f6a, 0 0 100px rgba(255,50,150,0.5); }
        #start-page.pink #start-btn:disabled { opacity: 0.25; cursor: not-allowed; box-shadow: none; color: rgba(255,100,170,0.2); border-color: rgba(255,100,170,0.1); }
        #start-page.pink #start-btn:disabled:hover { background: transparent; color: rgba(255,100,170,0.2); box-shadow: none; }
        #start-page.pink #mode-label { color: rgba(255,100,170,0.5); }
        #start-page.pink .mode-btn { color: rgba(255,100,170,0.4); border-color: rgba(255,100,170,0.2); }
        #start-page.pink .mode-btn:hover { color: #f6a; border-color: #f6a; box-shadow: 0 0 15px rgba(255,100,170,0.4); }
        #start-page.pink .mode-btn.active { background: #f6a; border-color: #f6a; box-shadow: 0 0 20px rgba(255,100,170,0.6); color: #000510; }
        #start-page.pink input { border-color: rgba(255,100,170,0.4); box-shadow: 0 0 25px rgba(255,100,170,0.3), inset 0 0 15px rgba(255,100,170,0.15); }
        #start-page.pink input:focus { border-color: #f6a; box-shadow: 0 0 35px #f6a, 0 0 70px rgba(255,100,170,0.4), inset 0 0 25px rgba(255,100,170,0.2); }
        #start-page.pink #start-controls { color: rgba(255,100,170,0.6); }
        #start-page.pink .page-footer { color: rgba(255,100,170,0.5); text-shadow: 0 0 8px rgba(255,100,170,0.3); }
        #start-controls {
            margin-top: 40px; font-size: 0.65em; opacity: 0.4; letter-spacing: 2px; color: #0ff; font-weight: bold;
        }
        #nav-links {
            margin-top: 32px; font-size: 0.72em; letter-spacing: 3px; font-weight: 900;
            display: flex; gap: 14px; justify-content: center; z-index: 1; position: relative;
        }
        #nav-links a {
            color: rgba(0,255,255,0.45); text-decoration: none; transition: 0.2s;
        }
        #nav-links a:hover { color: #0ff; text-shadow: 0 0 12px #0ff; }
        #nav-links span { color: rgba(0,255,255,0.15); }
        #start-page.pink #nav-links a { color: rgba(255,100,170,0.45); }
        #start-page.pink #nav-links a:hover { color: #f6a; text-shadow: 0 0 12px #f6a; }
        #start-page.pink #nav-links span { color: rgba(255,100,170,0.15); }
        .page-footer {
            position: absolute; bottom: 20px; left: 0; width: 100%; text-align: center;
            font-size: 0.95em; color: rgba(120,255,255,0.55); letter-spacing: 3px;
            opacity: 0.7; font-weight: bold;
            text-shadow: 0 0 8px rgba(100,255,255,0.2);
        }

        /* Score screen - glass + brutalist */
        #score-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background:
                linear-gradient(0deg, transparent 24%, rgba(255,0,255,0.015) 25%, rgba(255,0,255,0.015) 26%, transparent 27%, transparent 74%, rgba(255,0,255,0.015) 75%, rgba(255,0,255,0.015) 76%, transparent 77%),
                radial-gradient(ellipse at center, #100020 0%, #000510 70%);
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; color: #0ff; overflow-y: auto;
        }
        #score-screen h2 {
            font-size: 3.2em; font-weight: 900;
            text-shadow: 0 0 40px #f0f, 0 0 80px #f0f44, 3px 3px 0 rgba(0,0,0,0.8), 5px 0 #0ff44;
            animation: glitchH2 5s infinite; margin: 0 0 8px; letter-spacing: 10px;
            position: relative; z-index: 1;
        }
        #score-details { font-size: 1.2em; margin-bottom: 25px; line-height: 2.2; text-align: center; font-weight: bold; letter-spacing: 2px; }
        #score-details span { color: #f0f; text-shadow: 0 0 15px #f0f; }
        #leaderboard { margin: 10px auto 20px; max-width: 440px; max-height: 260px; overflow-y: auto; text-align: left; font-size: 0.85em; width: 100%; border: 1px solid rgba(0,255,255,0.08); background: rgba(0,0,0,0.2); padding: 6px 0; }
        #leaderboard h3 { text-align: center; color: #0ff; text-shadow: 0 0 15px #0ff; margin-bottom: 12px; letter-spacing: 6px; font-weight: 900; }
        #leaderboard::-webkit-scrollbar { width: 4px; }
        #leaderboard::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        #leaderboard::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.3); border-radius: 2px; }
        #leaderboard::-webkit-scrollbar-thumb:hover { background: rgba(0,255,255,0.5); }
        .lb-entry { display: flex; justify-content: space-between; padding: 5px 14px; border-bottom: 1px solid rgba(0,255,255,0.08); }
        .lb-rank { color: #ff0; width: 40px; font-weight: 900; text-shadow: 0 0 8px #ff0; }
        .lb-name { flex: 1; font-weight: bold; }
        .lb-score { color: #f0f; width: 60px; text-align: right; text-shadow: 0 0 8px #f0f; font-weight: bold; }
        .lb-time { color: #0ff; width: 70px; text-align: right; }
        #restart-btn {
            background: transparent; color: #0ff; border: 2px solid #0ff;
            padding: 12px 70px; font-family: 'Courier New', monospace; font-size: 1.3em; font-weight: 900;
            cursor: pointer; letter-spacing: 10px;
            box-shadow: 0 0 25px #0ff33; transition: 0.2s;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        #restart-btn:hover { background: #0ff; color: #000510; box-shadow: 0 0 50px #0ff, 0 0 100px #0ff66; }

        #pause-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #000510 0%, #000 100%);
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 450; color: #0ff;
        }
        #pause-screen h2 {
            font-size: 3.5em; font-weight: 900; letter-spacing: 16px;
            text-shadow: 0 0 40px #0ff, 0 0 80px #0ff44, 5px 0 #f0f44;
            margin: 0 0 8px;
        }
        #pause-screen p {
            font-size: 0.85em; letter-spacing: 4px; font-weight: bold;
            color: rgba(0,255,255,0.6); margin-top: 8px;
        }

        #ui-overlay { position: absolute; top: 10px; left: 10px; z-index: 10; width: 95%; pointer-events: none; }
        #mission-title { color: #0ff; font-size: 1.1em; font-weight: bold; text-shadow: 0 0 10px #0ff; }
        #health-container { width: 220px; height: 16px; border: 2px solid #0ff; background: #011; margin-top: 5px; box-shadow: 0 0 12px #0ff, inset 0 0 6px #0ff33; border-radius: 3px; position: relative; overflow: hidden; }
        #health-bar { width: 100%; height: 100%; transition: width 0.2s, background 0.3s; border-radius: 2px; }
        #health-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #fff; text-shadow: 0 0 4px #000; letter-spacing: 1px; z-index: 2; }
        #health-icon { margin-right: 6px; font-size: 12px; }

        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; 
            border: 2px solid #0ff; border-radius: 50%; transform: translate(-50%, -50%); 
            pointer-events: none; z-index: 100; opacity: 0.8;
        }
        #crosshair::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: #0ff; border-radius: 50%; transform: translate(-50%, -50%);
        }

        #blood-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 255, 255, 0.3); display: none; pointer-events: none; z-index: 15; }

        @media (min-width: 800px) { .mobile-controls, #attack-btn { display: none; } }
    </style>
</head>

        <div class="particles" id="particles-pause"></div>

            <h2>PAUSE</h2>
            <div class="start-line"></div>
            <p>ESC OR CLICK TO RESUME</p>
        </div>
    </div>
    <div id="crosshair"></div>
    <div id="blood-overlay"></div>

    function createMusic() {
        if (gameMode === 'littlehen') {
            trackA = new Audio('MUSICA/MUSICA LITTLE HEN/Little Hen Runs.mp3');
            trackB = new Audio('MUSICA/MUSICA LITTLE HEN/Little Hen Fleeing.mp3');
        } else {
            trackA = new Audio('MUSICA/Concrete Syntax__c95b4b99.mp3');
            trackB = new Audio('MUSICA/Concrete Syntax__2f47737a.mp3');
        }
        trackA.preload = 'auto'; trackB.preload = 'auto';
        trackA.volume = 0.25; trackB.volume = 0.25;
        currentTrack = trackA;

        trackA.addEventListener('ended', () => {
            trackA.currentTime = 0;
            currentTrack = trackB;
            trackB.currentTime = 0;
            if (musicPlaying) trackB.play().catch(() => {});
        });
        trackB.addEventListener('ended', () => {
            trackB.currentTime = 0;
            currentTrack = trackA;
            trackA.currentTime = 0;
            if (musicPlaying) trackA.play().catch(() => {});
        });
    }

    function startMusic() {
        if (!trackA) createMusic();
        try { trackA.pause(); trackB.pause(); } catch(e) {}
        trackA.currentTime = 0; trackB.currentTime = 0;
        musicPlaying = true;
        currentTrack = trackA;
        trackA.play().catch(() => {});
    }

    function stopMusic() {
        musicPlaying = false;
        try { trackA.pause(); trackA.currentTime = 0; } catch(e) {}
        try { trackB.pause(); trackB.currentTime = 0; } catch(e) {}
    }

    function pauseMusic() {
        musicPlaying = false;
        try { if (currentTrack) currentTrack.pause(); } catch(e) {}
    }

    function resumeMusic() {
        musicPlaying = true;
        try { if (currentTrack) currentTrack.play().catch(() => {}); } catch(e) {}
    }

    let audioCtx = null;
    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }

    function playSound(type) {
        try {
            const ctx = getAudioCtx();
            if (ctx.state === 'suspended') ctx.resume();
            const now = ctx.currentTime;

            if (type === 'default') {
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = 'square'; o.frequency.setValueAtTime(800, now);
                o.frequency.exponentialRampToValueAtTime(200, now + 0.06);
                g.gain.setValueAtTime(0.12, now);
                g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                o.connect(g); g.connect(ctx.destination);
                o.start(now); o.stop(now + 0.08);
            } else if (type === 'rapid') {
                for (let i = 0; i < 3; i++) {
                    const t = now + i * 0.04;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = 'square'; o.frequency.setValueAtTime(1200 + i * 200, t);
                    o.frequency.exponentialRampToValueAtTime(400, t + 0.04);
                    g.gain.setValueAtTime(0.08, t);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(t); o.stop(t + 0.05);
                }
            } else if (type === 'laser') {
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = 'sawtooth'; o.frequency.setValueAtTime(1800, now);
                o.frequency.exponentialRampToValueAtTime(3000, now + 0.04);
                o.frequency.exponentialRampToValueAtTime(200, now + 0.08);
                g.gain.setValueAtTime(0.06, now);
                g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                o.connect(g); g.connect(ctx.destination);
                o.start(now); o.stop(now + 0.1);
            } else if (type === 'shotgun') {
                const len = ctx.sampleRate * 0.12;
                const buf = ctx.createBuffer(1, len, ctx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
                const src = ctx.createBufferSource();
                const g = ctx.createGain();
                src.buffer = buf;
                g.gain.setValueAtTime(0.2, now);
                g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                src.connect(g); g.connect(ctx.destination);
                src.start(now);
            } else if (type === 'bomb') {
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = 'sine'; o.frequency.setValueAtTime(120, now);
                o.frequency.exponentialRampToValueAtTime(30, now + 0.25);
                g.gain.setValueAtTime(0.18, now);
                g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                o.connect(g); g.connect(ctx.destination);
                o.start(now); o.stop(now + 0.3);
            } else if (type === 'ray') {
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = 'triangle'; o.frequency.setValueAtTime(600, now);
                o.frequency.linearRampToValueAtTime(1400, now + 0.06);
                o.frequency.linearRampToValueAtTime(200, now + 0.15);
                g.gain.setValueAtTime(0.1, now);
                g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                o.connect(g); g.connect(ctx.destination);
                o.start(now); o.stop(now + 0.18);
            } else if (type === 'explosion') {
                const len = ctx.sampleRate * 0.3;
                const buf = ctx.createBuffer(1, len, ctx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
                const src = ctx.createBufferSource();
                const g = ctx.createGain();
                src.buffer = buf;
                g.gain.setValueAtTime(0.25, now);
                g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                src.connect(g); g.connect(ctx.destination);
                src.start(now);

                const o = ctx.createOscillator();
                const og = ctx.createGain();
                o.type = 'sine'; o.frequency.setValueAtTime(60, now);
                o.frequency.exponentialRampToValueAtTime(15, now + 0.25);
                og.gain.setValueAtTime(0.15, now);
                og.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                o.connect(og); og.connect(ctx.destination);
                o.start(now); o.stop(now + 0.25);
            }
        } catch(e) {}
    }

    function createGridTexture(bgColor, gridColor) {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = bgColor; ctx.fillRect(0, 0, 128, 128);
        ctx.strokeStyle = gridColor; ctx.lineWidth = 2;
        ctx.strokeRect(0,0,128,128);
        return new THREE.CanvasTexture(canvas);
    }

    function generateFace(base, eyes, type) {
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFF'; ctx.fillRect(0,0,64,64);
        ctx.fillStyle = '#000';

        if(type === 'happy') {
            // SCOUT: vertical slit eyes + stitched mouth
            ctx.fillRect(16,18,6,14); ctx.fillRect(42,18,6,14);
            ctx.fillRect(20,44,24,4);
            for (let x = 22; x < 44; x += 6) { ctx.fillRect(x,40,3,12); }
        } else if(type === 'angry') {
            // TANK: square grid eyes + equalizer mouth
            ctx.fillRect(10,16,14,14); ctx.fillRect(40,16,14,14);
            ctx.fillStyle = '#FFF'; ctx.fillRect(12,18,10,1); ctx.fillRect(42,18,10,1);
            ctx.fillRect(12,24,10,1); ctx.fillRect(42,24,10,1);
            ctx.fillStyle = '#000';
            const bars = [6,10,4,14,8,12,5,7];
            for (let i = 0; i < bars.length; i++) { ctx.fillRect(14+i*5, 50-bars[i]/2, 3, bars[i]); }
        } else {
            // SOLDIER: hollow square eyes + pixel tears + open square mouth
            ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
            ctx.strokeRect(13,17,12,12); ctx.strokeRect(39,17,12,12);
            for (let y = 32; y < 48; y += 2) { ctx.fillRect(18,y,2,2); ctx.fillRect(44,y,2,2); }
            ctx.fillRect(17,30,1,1); ctx.fillRect(20,31,2,1); ctx.fillRect(43,30,1,1); ctx.fillRect(46,31,2,1);
            ctx.strokeRect(24,46,16,10);
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.magFilter = THREE.NearestFilter;
        return tex;
    }

        return cells[Math.floor(Math.random() * cells.length)];

    function checkCollision(px, pz) {
        const wallRadius = UNIT_SIZE / 2;
        for (let i = 0; i < walls.length; i++) {
            const w = walls[i];
            const minX = w.position.x - wallRadius - PLAYER_RADIUS;
            const maxX = w.position.x + wallRadius + PLAYER_RADIUS;
            const minZ = w.position.z - wallRadius - PLAYER_RADIUS;
            const maxZ = w.position.z + wallRadius + PLAYER_RADIUS;

            if (px > minX && px < maxX && pz > minZ && pz < maxZ) {
                return true;
            }
        }
        return false;
    }

    async function loadScores() {
        let remoteScores = [];
        // Try Supabase first
        if (supabaseClient) {
            try {
                const { data, error } = await supabaseClient
                    .from('scores')
                    .select('*')
                    .order('score', { ascending: false })
                    .order('time', { ascending: true })
                    .limit(50);
                if (!error && data) remoteScores = data.map(s => ({ name: s.name, score: s.score, time: s.time, maps: s.maps, date: s.date }));
            } catch(e) {}
        }
        // Merge with localStorage as fallback
        let localScores = [];
        try { localScores = JSON.parse(localStorage.getItem('ghostcat_scores')) || []; } catch(e) {}
        const merged = [...remoteScores, ...localScores];
        merged.sort((a, b) => b.score - a.score || a.time - b.time);
        return merged;
    }

    async function saveScore(name, score, time, maps) {
        // Save locally
        let local = [];
        try { local = JSON.parse(localStorage.getItem('ghostcat_scores')) || []; } catch(e) {}
        local.push({ name: name.slice(0, 16), score, time: Math.floor(time), maps, date: Date.now() });
        local.sort((a, b) => b.score - a.score || a.time - b.time);
        if (local.length > 50) local.length = 50;
        try { localStorage.setItem('ghostcat_scores', JSON.stringify(local)); } catch(e) {}
        // Send to Supabase (fire-and-forget)
        if (supabaseClient) {
            supabaseClient.from('scores').insert([{ name: name.slice(0, 16), score, time: Math.floor(time), maps, date: Date.now() }]).catch(() => {});
        }
    }

        if (isPaused) { renderer.render(scene, camera); return; }

        if (gameActive) timerValue = (Date.now() - gameStartTime) / 1000;
        if (Math.floor(Date.now() / 1000) % 5 === 0) updateTimer();
        if (pendingPortal) {
            portalCount++;
            const pp = pendingPortal;
            pendingPortal = null;
            currentMapIndex = pp.targetMap;
            clearScene();
            buildMap();
            spawnPortals();
            portals.forEach(p => p.userData.active = false);
            setTimeout(() => {
                portals.forEach(p => p.userData.active = true);
            }, 2000);
            if (gameMode === 'littlehen') {
                for (let i = 0; i < 25; i++) spawnGhost();
            } else {
            for (let i = 0; i < 80; i++) spawnGhost();
            }
            spawnMedkits();
            spawnWeapons();
            camera.position.set(pp.tx, PLAYER_HEIGHT, pp.tz);
            for (let attempt = 0; attempt < 10 && checkCollision(camera.position.x, camera.position.z); attempt++) {
                camera.position.x += UNIT_SIZE;
            }
            updateHealthBar();
            updateWeaponUI();
            bullets.forEach(b => { if (b.mesh && b.mesh.parent) scene.remove(b.mesh); });
            explosions.forEach(e => { if (e.mesh && e.mesh.parent) scene.remove(e.mesh); });
            shockwaves.forEach(w => { if (w.parent) scene.remove(w); });
            bullets = []; explosions = []; shockwaves = [];
            return;
        }

        const speed = isRunning ? 0.27 : 0.15;
        const moveDir = new THREE.Vector3();
        const front = new THREE.Vector3();
        const side = new THREE.Vector3();

        camera.getWorldDirection(front);
        front.y = 0; front.normalize();
        side.crossVectors(front, new THREE.Vector3(0, 1, 0)).normalize();

        if (moveForward) moveDir.add(front);
        if (moveBackward) moveDir.sub(front);
        if (moveLeft) moveDir.sub(side);
        if (moveRight) moveDir.add(side);

        if (moveDir.length() > 0) {
            moveDir.normalize().multiplyScalar(speed);
            const nextX = camera.position.x + moveDir.x;
            if (!checkCollision(nextX, camera.position.z)) {
                camera.position.x = nextX;
            }
            const nextZ = camera.position.z + moveDir.z;
            if (!checkCollision(camera.position.x, nextZ)) {
                camera.position.z = nextZ;
            }
        }

        const hd = mapHeightData[currentMapIndex];
        if (hd) {
            const cx = Math.floor(camera.position.x / UNIT_SIZE);
            const cz = Math.floor(camera.position.z / UNIT_SIZE);
            const ch = (cx >= 0 && cx < MAP_SIZE && cz >= 0 && cz < MAP_SIZE && hd[cx] && hd[cx][cz] !== undefined) ? hd[cx][cz] : 0;
            const targetY = PLAYER_HEIGHT + ch;
            if (isJumping) {
                verticalVelocity -= GRAVITY;
                camera.position.y += verticalVelocity;
                if (camera.position.y <= targetY) { camera.position.y = targetY; isJumping = false; verticalVelocity = 0; }
            } else if (Math.abs(camera.position.y - targetY) > 0.05) {
                const dir = targetY > camera.position.y ? 1 : -1;
                camera.position.y += dir * (dir < 0 ? 0.5 : 0.15);
                if ((dir > 0 && camera.position.y > targetY) || (dir < 0 && camera.position.y < targetY)) camera.position.y = targetY;
            }
        } else if (isJumping) {
            verticalVelocity -= GRAVITY;
            camera.position.y += verticalVelocity;
            if (camera.position.y <= PLAYER_HEIGHT) { camera.position.y = PLAYER_HEIGHT; isJumping = false; verticalVelocity = 0; }
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.mesh.position.add(b.dir.clone().multiplyScalar(b.speed || 0.8));
            b.life--;
            let hit = false;
            if (b.type === 'bomb') {
                ghosts.forEach((g, idx) => {
                    if (b.mesh.position.distanceTo(g.position) < 4.0) {
                        g.userData.health--;
                        if (g.userData.health <= 0) {
                            scene.remove(g); ghosts.splice(idx, 1);
                            kills++; spawnGhost();
                            document.getElementById('kills-count').innerText = kills;
                        }
                        hit = true;
                    }
                });
                if (hit || b.life <= 0 || checkCollision(b.mesh.position.x, b.mesh.position.z)) {
                    createExplosion(b.mesh.position, 0xcc00ff, 25);
                    scene.remove(b.mesh); bullets.splice(i, 1);
                }
            } else if (b.type === 'ray') {
                for (let idx = ghosts.length - 1; idx >= 0; idx--) {
                    const g = ghosts[idx];
                    if (b.mesh.position.distanceTo(g.position) < 1.8) {
                        g.userData.health--;
                        if (g.userData.health <= 0) {
                            createExplosion(g.position, 0x44ff00);
                            scene.remove(g); ghosts.splice(idx, 1);
                            kills++; spawnGhost();
                            document.getElementById('kills-count').innerText = kills;
                        }
                        hit = true;
                    }
                }
                if (b.life <= 0 || checkCollision(b.mesh.position.x, b.mesh.position.z)) {
                    scene.remove(b.mesh); bullets.splice(i, 1);
                }
            } else {
                ghosts.forEach((g, idx) => {
                    if (b.mesh.position.distanceTo(g.position) < 1.5) {
                        g.userData.health--;
                        if (g.userData.health <= 0) {
                            createExplosion(g.position, 0x00ffff);
                            scene.remove(g); ghosts.splice(idx, 1);
                            kills++; spawnGhost();
                            document.getElementById('kills-count').innerText = kills;
                        }
                        hit = true;
                    }
                });
                if (hit || b.life <= 0 || checkCollision(b.mesh.position.x, b.mesh.position.z)) {
                    scene.remove(b.mesh); bullets.splice(i, 1);
                }
            }
        }

        explosions.forEach((e, i) => {
            e.mesh.position.add(e.vel); e.life -= 0.04;
            if (e.mesh.material) e.mesh.material.opacity = e.life;
            if(e.life <= 0) { scene.remove(e.mesh); explosions.splice(i,1); }
        });

        // Expanding shockwaves (NUKE mist)
        for (let i = shockwaves.length - 1; i >= 0; i--) {
            const w = shockwaves[i];
            w.userData.life -= 0.015;
            w.userData.scale += 0.8;
            w.scale.setScalar(w.userData.scale);
            w.material.opacity = Math.max(0, w.userData.life * 0.3);
            if (w.userData.life <= 0) { scene.remove(w); shockwaves.splice(i, 1); }
        }

        ghosts.forEach(g => {
            const d = g.position.distanceTo(camera.position);
            g.lookAt(camera.position);
            if (d < 25) {
                const f = new THREE.Vector3().subVectors(camera.position, g.position).normalize();
                g.position.x += f.x * g.userData.speed;
                g.position.z += f.z * g.userData.speed;
                const by = g.userData.baseY || 0;
                g.position.y = by + 1.2 + Math.sin(Date.now()*0.005)*0.2;
            }
            if (d < 1.5) takeDamage();
        });

        medkits.forEach(m => {
            if (!m.userData.active) return;
            m.position.y = 1.0 + Math.sin(Date.now()*0.003)*0.2;
            m.rotation.y += 0.01;
        });
        checkMedkitPickup();

        weaponPickups.forEach(w => {
            if (!w.userData.active) return;
            w.position.y = 1.2 + Math.sin(Date.now()*0.004)*0.2;
            w.rotation.y += 0.02;
        });
        checkWeaponPickup();

        portals.forEach(p => {
            p.rotation.z += 0.02;
            p.children.forEach(c => {
                if (c.isMesh && c.geometry.type === 'TorusGeometry') c.material.opacity = 0.5 + Math.sin(Date.now()*0.004)*0.4;
                if (c.isMesh && c.geometry.type === 'RingGeometry' && c.position.y < 0.1) c.material.opacity = 0.2 + Math.sin(Date.now()*0.005)*0.12;
            });
            if (p.userData.particles) {
                const t = Date.now() * 0.001;
                p.userData.particles.forEach(par => {
                    const a = par.userData.angle + t * par.userData.speed;
                    par.position.x = Math.cos(a) * par.userData.radius;
                    par.position.z = Math.sin(a) * par.userData.radius;
                    par.position.y = par.userData.yOff + Math.sin(t * 1.5 + a) * 0.6;
                    par.material.opacity = 0.4 + Math.sin(t * 2 + a) * 0.3;
                });
            }
            if (p.userData.active) {
                const dist = p.position.distanceTo(camera.position);
                if (dist < 2.5 && !pendingPortal) {
                    let dest;
                    do { dest = Math.floor(Math.random() * MAP_COUNT); } while (dest === currentMapIndex);
            const sp = randomSpawnPos(getMap());
            pendingPortal = { targetMap: dest, tx: sp.x, tz: sp.z };
                }
            }
        });

        if (mouseDown && (currentWeapon === 'rapid' || currentWeapon === 'laser')) {
            rapidFireTimer++;
            if (currentWeapon === 'rapid' && rapidFireTimer % 5 === 0) {
                playSound('rapid');
                for (let s = 0; s < 3; s++) {
                    const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                    dir.x += (Math.random() - 0.5) * 0.06;
                    dir.y += (Math.random() - 0.5) * 0.06;
                    dir.normalize();
                    const pos = camera.position.clone(); pos.y -= 0.3;
                    const b = new THREE.Mesh(new THREE.SphereGeometry(0.04, 4, 4), new THREE.MeshBasicMaterial({color: 0x00ff88}));
                    b.position.copy(pos); scene.add(b);
                    bullets.push({ mesh: b, dir: dir, life: 30, speed: 1.5, type: 'default' });
                }
            }
            if (currentWeapon === 'laser' && rapidFireTimer % 4 === 0) {
                playSound('laser');
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                const pos = camera.position.clone(); pos.y -= 0.3;
                const b = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.06, 0.5, 4), new THREE.MeshBasicMaterial({color: 0xff0044}));
                b.position.copy(pos); scene.add(b);
                bullets.push({ mesh: b, dir: dir, life: 20, speed: 2.0, type: 'default' });
            }
        } else if (!mouseDown) {
            rapidFireTimer = 0;
        }

        renderer.render(scene, camera);
    }

    function randomGhostPos(map) {
        for (let attempt = 0; attempt < 200; attempt++) {
            const rx = Math.floor(Math.random() * MAP_SIZE);
            const rz = Math.floor(Math.random() * MAP_SIZE);
            if (map[rx][rz] === 0 && Math.abs(rx*UNIT_SIZE - camera.position.x) >= 3) {
                return { x: rx * UNIT_SIZE, z: rz * UNIT_SIZE };
            }
        }
        return null;
    }

    const ghostConfigs = [
        // Map 0: Cripta Celeste (dark bg) - colores neón vivos
        [
            { weight: 0.2, sizeMin:0.8,sizeR:0.3, hp:1, spdMin:0.15,spdR:0.08, tex:'happy', col:0x00ff88 },
            { weight: 0.3, sizeMin:1.8,sizeR:0.6, hp:3, spdMin:0.04,spdR:0.03, tex:'angry', col:0xff4400 },
            { weight: 0.5, sizeMin:1.0,sizeR:0.4, hp:2, spdMin:0.06,spdR:0.06, tex:'normal', col:0x00ffff }
        ],
        // Map 1: Abismo Ámbar (dark bg, amber) - contrastan con naranja
        [
            { weight: 0.25, sizeMin:0.6,sizeR:0.3, hp:1, spdMin:0.18,spdR:0.08, tex:'happy', col:0xffff00 },
            { weight: 0.15, sizeMin:2.2,sizeR:0.8, hp:4, spdMin:0.03,spdR:0.03, tex:'angry', col:0xff0000 },
            { weight: 0.6, sizeMin:1.0,sizeR:0.5, hp:2, spdMin:0.07,spdR:0.07, tex:'normal', col:0xff6600 }
        ],
        // Map 2: Laberinto Alabastro (fondo BLANCO/GRIS) - colores vivos que resalten
        [
            { weight: 0.3, sizeMin:0.5,sizeR:0.2, hp:1, spdMin:0.2,spdR:0.1, tex:'happy', col:0xff0044 },
            { weight: 0.2, sizeMin:1.5,sizeR:0.5, hp:3, spdMin:0.02,spdR:0.02, tex:'angry', col:0x0044ff },
            { weight: 0.5, sizeMin:0.7,sizeR:0.3, hp:2, spdMin:0.1,spdR:0.05, tex:'normal', col:0xff00ff }
        ],
        // Map 3: Bastión Escalonado (dark earthy) - neón vivos
        [
            { weight: 0.15, sizeMin:1.0,sizeR:0.4, hp:2, spdMin:0.08,spdR:0.06, tex:'normal', col:0xffff00 },

        ],
        // Map 4: Kaleidoscope Prism (dark bg, magenta theme) - bright contrasting colors
        [
            { weight: 0.25, sizeMin:0.5,sizeR:0.3, hp:1, spdMin:0.12,spdR:0.1, tex:'happy', col:0x00ffcc },

            { weight: 0.4, sizeMin:0.8,sizeR:0.5, hp:2, spdMin:0.08,spdR:0.07, tex:'normal', col:0x44ff44 }
        ]
    ];

    function pickGhostConfig() {
        const cfg = ghostConfigs[currentMapIndex] || ghostConfigs[0];
        const roll = Math.random();
        let acc = 0;
        for (const g of cfg) {
            acc += g.weight;
            if (roll < acc) return g;
        }
        return cfg[cfg.length-1];
    }

    function getHeightAt(cx, cz) {
        const hd = mapHeightData[currentMapIndex];
        if (!hd || cx < 0 || cx >= MAP_SIZE || cz < 0 || cz >= MAP_SIZE) return 0;
        return (hd[cx] && hd[cx][cz] !== undefined) ? hd[cx][cz] : 0;
    }

    function spawnGhost() {
        const map = getMap();
        const gc = pickGhostConfig();
        const size = gc.sizeMin + Math.random() * gc.sizeR;
        const hp = gc.hp;
        const spd = gc.spdMin + Math.random() * gc.spdR;
        const texMap = gc.tex === 'happy' ? texHappy : gc.tex === 'angry' ? texAngry : texNormal;
        const col = gc.col;

        const pos = randomGhostPos(map);
        if (!pos) return;
        const cellX = Math.floor(pos.x / UNIT_SIZE);
        const cellZ = Math.floor(pos.z / UNIT_SIZE);
        const gh = getHeightAt(cellX, cellZ);
        const mat = new THREE.MeshBasicMaterial({ map: texMap, color: col });

        let g;
        if (gc.tex === 'happy') {
            // SCOUT: elongated cube
            const geo = new THREE.BoxGeometry(size*0.7, size*1.4, size*0.7);
            g = new THREE.Mesh(geo, mat);
        } else if (gc.tex === 'angry') {
            // TANK: cube cluster
            g = new THREE.Group();
            const core = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
            g.add(core);
            const corners = [[size*0.45,size*0.4,size*0.4],[-size*0.4,size*0.5,-size*0.35],[size*0.4,-size*0.45,size*0.35],[-size*0.5,-size*0.4,-size*0.45],[size*0.5,size*0.35,-size*0.5]];
            corners.forEach(([dx,dy,dz]) => {
                const sub = new THREE.Mesh(new THREE.BoxGeometry(size*0.35, size*0.35, size*0.35), mat.clone());
                sub.position.set(dx, dy, dz); g.add(sub);
            });
        } else {
            // SOLDIER: perfect cube + sub-cube
            g = new THREE.Group();
            const main = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
            g.add(main);
            const sub = new THREE.Mesh(new THREE.BoxGeometry(size*0.35, size*0.35, size*0.35), mat.clone());
            sub.position.set(-size*0.45, -size*0.5, 0); g.add(sub);
        }

        g.position.set(pos.x, gh + size/2 + 0.5, pos.z);
        g.userData = { health: hp, speed: spd, baseY: gh };
        scene.add(g); ghosts.push(g);
    }

    function takeDamage() {
        if (!gameActive || isInvulnerable) return;
        playerHealth -= 15;
        isInvulnerable = true;
        document.getElementById('blood-overlay').style.display = 'block';
        updateHealthBar();
        setTimeout(() => { document.getElementById('blood-overlay').style.display = 'none'; isInvulnerable = false; }, 300);
        if (playerHealth <= 0) showScoreScreen();
    }

    function createExplosion(pos, col, count) {
        playSound('explosion');
        const num = Math.min(count || 10, 8);
        const flash = new THREE.PointLight(col, 4, 8); flash.position.copy(pos);
        scene.add(flash); setTimeout(() => scene.remove(flash), 80);
        for (let i = 0; i < num; i++) {
            const p = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.2), new THREE.MeshBasicMaterial({color: col, transparent: true}));
            p.position.copy(pos);
            const vel = new THREE.Vector3((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5);
            scene.add(p); explosions.push({ mesh: p, vel: vel, life: 1.0 });
        }
    }

    function fireShotgun() {
        playSound('shotgun');
        const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
        const pos = camera.position.clone(); pos.y -= 0.3;
        for (let i = 0; i < 5; i++) {
            const d = dir.clone();
            d.x += (Math.random() - 0.5) * 0.15;
            d.y += (Math.random() - 0.5) * 0.15;
            d.z += (Math.random() - 0.5) * 0.15;
            d.normalize();
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.08, 4, 4), new THREE.MeshBasicMaterial({color: 0xff6600}));
            b.position.copy(pos);
            scene.add(b);
            bullets.push({ mesh: b, dir: d, life: 30, speed: 0.9, type: 'default' });
        }
    }

    function fireRay() {
        playSound('ray');
        const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
        const pos = camera.position.clone(); pos.y -= 0.3;
        const b = new THREE.Mesh(new THREE.ConeGeometry(0.15, 1.2, 6), new THREE.MeshBasicMaterial({color: 0x44ff00}));
        b.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
        b.position.copy(pos);
        scene.add(b);
        bullets.push({ mesh: b, dir: dir, life: 80, speed: 0.7, type: 'ray' });
    }

    function createBullet() {
        const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
        const pos = camera.position.clone();
        pos.y -= 0.3;

        if (currentWeapon === 'bomb') {
            playSound('bomb');
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshBasicMaterial({color: 0xcc00ff}));
            b.position.copy(pos);
            scene.add(b);
            bullets.push({ mesh: b, dir: dir, life: 80, speed: 0.35, type: 'bomb' });
        } else if (currentWeapon === 'nuke') {
            playSound('bomb');
            const nukePos = camera.position.clone();

            // Soft white mist flash (subtle, no epilepsy)
            document.getElementById('blood-overlay').style.background = 'rgba(255,255,255,0.35)';
            document.getElementById('blood-overlay').style.display = 'block';
            setTimeout(() => {
                document.getElementById('blood-overlay').style.background = 'rgba(0,255,255,0.3)';
                document.getElementById('blood-overlay').style.display = 'none';
            }, 800);

            // Single central flash (lightweight)
            createExplosion(nukePos, 0xffffff, 15);

            // NUKE: destroy every ghost on the map
            const killedCount = ghosts.length;
            // Remove using original array reference
            const allGhosts = ghosts.splice(0);
            allGhosts.forEach(g => scene.remove(g));
            kills += killedCount;
            document.getElementById('kills-count').innerText = kills;

            // Respawn after delay so player sees the wipe
            const respawnCount = gameMode === 'littlehen' ? 12 : 40;
            setTimeout(() => {
                for (let i = 0; i < respawnCount; i++) spawnGhost();
            }, 600);

            // Expanding fog ring (subtle mist advancing)
            const waveGeo = new THREE.RingGeometry(0.3, 2.0, 24);
            const waveMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
            const wave = new THREE.Mesh(waveGeo, waveMat);
            wave.rotation.x = -Math.PI/2;
            wave.position.copy(nukePos);
            wave.position.y = 0.05;
            wave.userData = { scale: 0.8, life: 1.0 };
            scene.add(wave);
            shockwaves.push(wave);

            // Revert weapon
            currentWeapon = previousWeapon;
            previousWeapon = 'default';
            updateWeaponUI();
            return;
        } else if (currentWeapon === 'shotgun') {
            fireShotgun();
        } else if (currentWeapon === 'ray') {
            fireRay();
        } else {
            playSound('default');
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6), new THREE.MeshBasicMaterial({color: 0x00ff00}));
            b.position.copy(pos);
            scene.add(b);
            bullets.push({ mesh: b, dir: dir, life: 60, speed: 0.8, type: 'default' });
        }
    }

    function setupControls() {
        const canvas = document.getElementById('mazeCanvas');
        const pauseEl = document.getElementById('pause-screen');
        let wasPointerLocked = false;

        function togglePause() {
            if (!gameActive || document.getElementById('score-screen').style.display === 'flex') return;
            isPaused = !isPaused;
            if (isPaused) {
                wasPointerLocked = (document.pointerLockElement === canvas);
                document.exitPointerLock();
                pauseMusic();
                pauseEl.style.display = 'flex';
            } else {
                pauseEl.style.display = 'none';
                wasPointerLocked = false;
                resumeMusic();
                setTimeout(() => { if (!isPaused && gameActive) canvas.requestPointerLock(); }, 30);
            }
        }

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === canvas) {
                wasPointerLocked = true;
            } else if (wasPointerLocked && gameActive && !isPaused && document.getElementById('score-screen').style.display !== 'flex') {
                isPaused = true;
                pauseEl.style.display = 'flex';
                wasPointerLocked = false;
            }
        });

        // Resume by clicking anywhere on the canvas area after unpause
        canvas.addEventListener('click', () => {
            if (!isPaused && gameActive && document.pointerLockElement !== canvas) {
                canvas.requestPointerLock();
            }
        });

        pauseEl.addEventListener('click', () => { if (isPaused) togglePause(); });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === canvas && !isPaused) {
                camera.rotation.y -= e.movementX * 0.003;
                camera.rotation.x -= e.movementY * 0.003;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        document.addEventListener('mousedown', () => {
            if (document.pointerLockElement === canvas && gameActive && !isPaused) {
                mouseDown = true;
                if (currentWeapon !== 'rapid' && currentWeapon !== 'laser') createBullet();
            }
        });
        document.addEventListener('mouseup', () => { mouseDown = false; });

        window.onkeydown = (e) => {
            if (e.code === 'Escape') { togglePause(); return; }
            if(isPaused) return;
            if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') isRunning = true;
            if(e.code === 'KeyW' || e.code === 'ArrowUp') moveForward = true;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') moveBackward = true;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') moveLeft = true;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') moveRight = true;
            if(e.code === 'Space' && !isJumping) { isJumping = true; verticalVelocity = JUMP_FORCE; }
        };

        window.onkeyup = (e) => {
            if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') isRunning = false;
            if(e.code === 'KeyW' || e.code === 'ArrowUp') moveForward = false;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') moveBackward = false;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') moveLeft = false;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') moveRight = false;
        };
    }

    window.onload = function() {
        // Spawn floating particles
        (function spawnParticles(containerId, count, colors) {
            var c = document.getElementById(containerId);
            if (!c) return;
            for (var i = 0; i < count; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                var col = colors[Math.floor(Math.random() * colors.length)];
                var size = 1 + Math.random() * 3;
                p.style.cssText = 'left:'+(Math.random()*100)+'%;width:'+size+'px;height:'+size+'px;background:'+col+';box-shadow:0 0 '+size*2+'px '+col+';animation-duration:'+(8+Math.random()*12)+'s;animation-delay:'+(Math.random()*10)+'s;opacity:'+(0.2+Math.random()*0.5);
                c.appendChild(p);
            }
        })('particles-start', 35, ['#0ff','#f0f','rgba(0,255,255,0.5)','rgba(255,0,255,0.5)']);
        (function spawnParticles(containerId, count, colors) {
            var c = document.getElementById(containerId);
            if (!c) return;
            for (var i = 0; i < count; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                var col = colors[Math.floor(Math.random() * colors.length)];

                p.style.cssText = 'left:'+(Math.random()*100)+'%;width:'+size+'px;height:'+size+'px;background:'+col+';box-shadow:0 0 '+size*2+'px '+col+';animation-duration:'+(10+Math.random()*14)+'s;animation-delay:'+(Math.random()*12)+'s;opacity:'+(0.2+Math.random()*0.4);
                c.appendChild(p);
            }
        })('particles-score', 25, ['#f0f','#0ff','rgba(255,0,255,0.5)','rgba(0,255,255,0.4)']);
        (function spawnParticles(containerId, count, colors) {
            var c = document.getElementById(containerId);
            if (!c) return;
            for (var i = 0; i < count; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                var col = colors[Math.floor(Math.random() * colors.length)];
                var size = 1 + Math.random() * 3;
                p.style.cssText = 'left:'+(Math.random()*100)+'%;width:'+size+'px;height:'+size+'px;background:'+col+';box-shadow:0 0 '+size*2+'px '+col+';animation-duration:'+(8+Math.random()*12)+'s;animation-delay:'+(Math.random()*10)+'s;opacity:'+(0.15+Math.random()*0.3);
                c.appendChild(p);
            }
        })('particles-pause', 20, ['#0ff','#f0f','rgba(0,255,255,0.4)','rgba(255,0,255,0.4)']);

        document.getElementById('restart-btn').addEventListener('click', () => location.reload());

        // Game mode selector
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                gameMode = this.dataset.mode;
                const sp = document.getElementById('start-page');
                if (gameMode === 'littlehen') sp.classList.add('pink');
                else sp.classList.remove('pink');
            });
        });

        // Require name before enabling PLAY
        const nameInput = document.getElementById('player-name');
        const playBtn = document.getElementById('start-btn');
        nameInput.addEventListener('input', () => {
            playBtn.disabled = nameInput.value.trim().length === 0;
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            const inp = document.getElementById('player-name');
            playerName = inp.value.trim();
            if (!playerName) return;
            gameStartTime = Date.now();
            timerValue = 0; portalCount = 0;
            document.getElementById('start-page').style.display = 'none';
            init();
            startMusic();
            document.getElementById('mazeCanvas').requestPointerLock();
        });
    };
</script>
